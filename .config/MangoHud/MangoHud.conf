throttling_status_graph

### Change the hud font size
font_size=24
text_color=CDD6F4
text_outline_color=313244
font_scale=1.0
no_small_font

### Disable / hide the hud by default
no_display

################ INTERACTION #################

### Change toggle keybinds for the hud & logging
toggle_hud=Shift_L+F12
reset_fps_metrics=Shift_L+F11
