################### GENERAL ###################
legacy_layout=false
round_corners=10
background_alpha=0.8
background_color=1E1E2E
table_columns=3

################ PERFORMANCE #################

### Limit the application FPS. Comma-separated list of one or more FPS values (e.g. 0,30,60). 0 means unlimited (unless VSynced)
# fps_limit=60

################### VISUAL ###################

### GPU
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_temp
gpu_mem_clock
gpu_power
gpu_power_limit
gpu_text=GPU
gpu_color=A6E3A1
gpu_load_change
