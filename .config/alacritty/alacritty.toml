[env]
TERM = "xterm-256color"

[terminal]
shell = { program = "/bin/zsh", args = [ "--login", "--interactive" ] }

[bell]
duration = 0

[selection]
save_to_clipboard = true

[cursor]
blink_interval = 500
style = { shape = "Block", blinking = "On" }

[general]
live_config_reload = true
working_directory = "None"
import = [
  "~/.config/alacritty/config.d/keybindings.toml",
  "~/.config/alacritty/config.d/window.toml",
  "~/.config/alacritty/config.d/font.toml",
  "~/.config/alacritty/config.d/theme.toml"
]
