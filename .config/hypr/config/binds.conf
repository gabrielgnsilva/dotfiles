# programs

$appMenu         = "${XDG_CONFIG_HOME}"/BLAST/apps/applauncher.sh
$logoutMenu      = "${XDG_CONFIG_HOME}"/BLAST/apps/logoutmenu.sh
$clipHistMenu    = "${XDG_CONFIG_HOME}"/BLAST/apps/cliphist.sh
$emojiMenu       = "${XDG_CONFIG_HOME}"/BLAST/apps/emojipicker.sh
$browser         = "${XDG_CONFIG_HOME}"/BLAST/apps/browser.sh
$gui_fileManager = "${XDG_CONFIG_HOME}"/BLAST/apps/gui-filemanager.sh
$screenshot      = "${XDG_CONFIG_HOME}"/BLAST/apps/screenshot.sh

$terminal    = "${XDG_CONFIG_HOME}"/BLAST/apps/terminal.sh
$fileManager = $terminal launch "${XDG_CONFIG_HOME}"/BLAST/apps/filemanager.sh
$editor      = $terminal launch "${XDG_CONFIG_HOME}"/BLAST/apps/editor.sh

$volumeController = "${XDG_CONFIG_HOME}"/BLAST/scripts/volume.sh
$audioRaiseVolume = $volumeController +1
$audioLowerVolume = $volumeController -1
$audioToggleMute  = $volumeController --toggle-mute

$wallpaperController = "${XDG_CONFIG_HOME}"/BLAST/scripts/wallpaper.sh
$cycleWallpaper      = $wallpaperController --cycle
$setDefaultWallpaper = $wallpaperController --default

$taskbarController   = "${XDG_CONFIG_HOME}"/BLAST/scripts/taskbar.sh
$reloadTaskbarConfig = $taskbarController --reload-config
$toggleTaskbar       = $taskbarController --toggle
$hideTaskbar         = $taskbarController --hide
$showTaskbar         = $taskbarController --show


# mods
$mod1 = SUPER
$mod2 = ALT

# system
bind   = $mod1 $mod2, M,                    exit,
bind   = $mod1 $mod2, L,                    exec, $logoutMenu
bindel =,             XF86AudioRaiseVolume, exec, $audioRaiseVolume
bindel =,             XF86AudioLowerVolume, exec, $audioLowerVolume
bind   =,             XF86AudioMute,        exec, $audioToggleMute
bind   = $mod1,       M,                    exec, $cycleWallpaper
bind   = $mod2,       M,                    exec, $setDefaultWallpaper

# programs
bind = $mod1,       R,      exec, $appMenu
bind = $mod1,       RETURN, exec, $terminal
bind = $mod1,       Q,      exec, $browser
bind = $mod1,       W,      exec, $editor
bind = $mod1,       E,      exec, $fileManager
bind = $mod1,       T,      exec, $gui_fileManager
bind = $mod1,       PERIOD, exec, $emojiMenu
bind = $mod1 SHIFT, R,      exec, $reloadTaskbarConfig
bind = $mod1,       B,      exec, $toggleTaskbar
bind = $mod1,       V,      exec, $clipHistMenu
bind =,             Print,  exec, $screenshot

# window
bind = $mod1,           C, killactive
bind = $mod1 CONTROL_L, F, fullscreen, 0

# floating window
bind = $mod1,           F, togglefloating
bind = $mod1,           F, centerwindow
bind = $mod1 CONTROL_L, V, pin

# move focus
bind = $mod1, left,  movefocus, l
bind = $mod1, right, movefocus, r
bind = $mod1, up,    movefocus, u
bind = $mod1, down,  movefocus, d

bind = $mod1, H, movefocus, l
bind = $mod1, J, movefocus, d
bind = $mod1, K, movefocus, u
bind = $mod1, L, movefocus, r

bind = $mod1, TAB, cyclenext, none

# move/resize windows with mouse
bindm = $mod1, mouse:272, movewindow
bindm = $mod1, mouse:273, resizewindow

binde = $mod1 SHIFT, H, resizeactive, -10% 0
binde = $mod1 SHIFT, J, resizeactive, 0 10%
binde = $mod1 SHIFT, K, resizeactive, 0 -10%
binde = $mod1 SHIFT, L, resizeactive, 10% 0
binde = $mod1 SHIFT, O, splitratio,   exact 1

# move window
bind = $mod1 CONTROL_L, left,  movewindow, l
bind = $mod1 CONTROL_L, right, movewindow, r
bind = $mod1 CONTROL_L, up,    movewindow, u
bind = $mod1 CONTROL_L, down,  movewindow, d

bind = $mod1 CONTROL_L, H, movewindow, l
bind = $mod1 CONTROL_L, J, movewindow, d
bind = $mod1 CONTROL_L, K, movewindow, u
bind = $mod1 CONTROL_L, L, movewindow, r

# swap master window
bind = $mod1, SPACE, layoutmsg, swapsplit
bind = $mod1, O,     layoutmsg, movetoroot active unstable

# switch workspaces
bind = $mod1, N, workspace, e+1
bind = $mod1, P, workspace, e-1
bind = $mod1, I, workspace, previous
bind = $mod1, Z, workspace, previous

bind = $mod1, 1, workspace, 1
bind = $mod1, 2, workspace, 2
bind = $mod1, 3, workspace, 3
bind = $mod1, 4, workspace, 4
bind = $mod1, 5, workspace, 5
bind = $mod1, 6, workspace, 6
bind = $mod1, 7, workspace, 7
bind = $mod1, 8, workspace, 8
bind = $mod1, 9, workspace, 9
bind = $mod1, 0, workspace, 10
bind = $mod1, A, workspace, 8
bind = $mod1, S, workspace, 9
bind = $mod1, D, workspace, 10

# move active window to a workspace
bind = $mod1 CONTROL_L, 1, movetoworkspacesilent, 1
bind = $mod1 CONTROL_L, 2, movetoworkspacesilent, 2
bind = $mod1 CONTROL_L, 3, movetoworkspacesilent, 3
bind = $mod1 CONTROL_L, 4, movetoworkspacesilent, 4
bind = $mod1 CONTROL_L, 5, movetoworkspacesilent, 5
bind = $mod1 CONTROL_L, 6, movetoworkspacesilent, 6
bind = $mod1 CONTROL_L, 7, movetoworkspacesilent, 7
bind = $mod1 CONTROL_L, 8, movetoworkspacesilent, 8
bind = $mod1 CONTROL_L, 9, movetoworkspacesilent, 9
bind = $mod1 CONTROL_L, 0, movetoworkspacesilent, 10
bind = $mod1 CONTROL_L, A, movetoworkspacesilent, 8
bind = $mod1 CONTROL_L, S, movetoworkspacesilent, 9
bind = $mod1 CONTROL_L, D, movetoworkspacesilent, 10

bind = $mod1 SHIFT, 1, movetoworkspace, 1
bind = $mod1 SHIFT, 2, movetoworkspace, 2
bind = $mod1 SHIFT, 3, movetoworkspace, 3
bind = $mod1 SHIFT, 4, movetoworkspace, 4
bind = $mod1 SHIFT, 5, movetoworkspace, 5
bind = $mod1 SHIFT, 6, movetoworkspace, 6
bind = $mod1 SHIFT, 7, movetoworkspace, 7
bind = $mod1 SHIFT, 8, movetoworkspace, 8
bind = $mod1 SHIFT, 9, movetoworkspace, 9
bind = $mod1 SHIFT, 0, movetoworkspace, 10
bind = $mod1 SHIFT, A, movetoworkspace, 8
bind = $mod1 SHIFT, S, movetoworkspace, 9
bind = $mod1 SHIFT, D, movetoworkspace, 10

# BRB
bind = $mod1, G, exec, $hideTaskbar
bind = $mod1, G, workspace, 7

# BAK
bind = $mod1, Y, exec, $showTaskbar
bind = $mod1, Y, workspace, previous
