env = XAUTHORITY,$XDG_RUNTIME_DIR/Xauthority
env = XCOMPOSEFILE,$XDG_CONFIG_HOME/X11/xcompose
env = XCOMPOSECACHE,$XDG_CACHE_HOME/X11/xcompose

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

env = XCURSOR_PATH,$XCURSOR_PATH:$HOME/.local/share/icons:/usr/share/icons
env = XCURSOR_SIZE,24

env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,capitaine-cursors-light
env = HYPRLAND_TRACE,1 # Enables more verbose logging
env = AQ_TRACE,1       # Enables more verbose logging

exec = gsettings set org.gnome.desktop.interface cursor-theme 'capitaine-cursors-light'
exec = gsettings set org.gnome.desktop.interface cursor-size 20
exec = gsettings set org.gnome.desktop.interface font-name 'Cantarell 10'
exec = gsettings set org.gnome.desktop.interface document-font-name 'Cantarell 10'
exec = gsettings set org.gnome.desktop.interface monospace-font-name 'CaskaydiaCove Nerd Font Mono 9'
exec = gsettings set org.gnome.desktop.interface font-antialiasing 'rgba'
exec = gsettings set org.gnome.desktop.interface font-hinting 'full'
exec = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
