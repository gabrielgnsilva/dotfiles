$font = Monospace

general {
    hide_cursor = true
}

animations {
    enabled = false
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 3
}

input-field {
    monitor           =
    size              = 20%, 5%
    outline_thickness = 2
    inner_color       = rgba(0, 0, 0, 0.0)

    outer_color = rgba(595959aa)
    check_color = rgba(ff8080ee)
    fail_color  = rgba(595959aa)

    font_color    = rgb(143, 143, 143)
    fade_on_empty = false
    rounding      = 10

    font_family      = $font
    placeholder_text = Passphrase...
    fail_text        = $PAMFAIL

    hide_input = true # use an input indicator that does not show the password length

    position = 0, -20
    halign   = center
    valign   = center
}

label {
    monitor     =
    text        = $ATTEMPTS[] $PAMFAIL
    font_family = $font
    font_size   = 12

    position = 0, -80
    halign   = center
    valign   = center
}

# TIME
label {
    monitor     =
    text        = $TIME
    font_size   = 90
    font_family = $font

    position = -30, 0
    halign   = right
    valign   = top
}

# DATE
label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size   = 25
    font_family = $font

    position = -30, -150
    halign   = right
    valign   = top
}
