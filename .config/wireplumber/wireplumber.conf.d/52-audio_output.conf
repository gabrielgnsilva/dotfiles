monitor.alsa.rules = [
  {
    matches = [
      { "node.name" = "alsa_output.pci-0000_03_00.1.hdmi-stereo" }
    ]
    actions = {
      update-props = {
        "node.disabled" = true
      }
    }
  }
  {
    matches = [
      { "node.name" = "alsa_output.usb-Generic_AB13X_USB_Audio_20210926172016-00.analog-stereo" }
    ]
    actions = {
      update-props = {
        "node.description" = "Headset (Analog P2)"
        "node.nick"        = "Headset"
        "priority.driver"  = 100
        "priority.session" = 100
      }
    }
  }
  {
    matches = [
      { "node.name" = "alsa_output.pci-0000_00_1f.3.analog-stereo" }
    ]
    actions = {
      update-props = {
        "node.description"  = "Speaker (Analog P2)"
        "node.nick"         = "Speaker"
        "audio.channel-mix" = "mono"
        "priority.driver"   = 200
        "priority.session"  = 200
      }
    }
  }
  {
    matches = [
      { "node.name" = "alsa_output.usb-MV-SILICON_fifine_Microphone_20190808-00.analog-stereo" }
    ]
    actions = {
      update-props = {
        "node.description"  = "Fifine Mic (Output Jack)"
        "node.nick"         = "Fifine Mic"
        "audio.channel-mix" = "mono"
        "priority.driver"   = 300
        "priority.session"  = 300
      }
    }
  }
]
